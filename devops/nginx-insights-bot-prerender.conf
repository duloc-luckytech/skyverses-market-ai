# =============================================================
# Nginx Bot-Detection Prerender — insights.skyverses.com
# Add this inside the server {} block for insights.skyverses.com
# =============================================================

# Detect social bots by User-Agent
map $http_user_agent $is_social_bot {
    default                     0;
    "~*facebookexternalhit"     1;
    "~*Facebot"                 1;
    "~*Twitterbot"              1;
    "~*LinkedInBot"             1;
    "~*Slackbot"                1;
    "~*TelegramBot"             1;
    "~*WhatsApp"                1;
    "~*Zalo"                    1;
    "~*Pinterest"               1;
    "~*Googlebot"               1;
    "~*bingbot"                 1;
    "~*Applebot"                1;
    "~*ia_archiver"             1;
    "~*rogerbot"                1;
    "~*embedly"                 1;
}

server {
    listen 443 ssl;
    server_name insights.skyverses.com;

    # ... your existing SSL certs ...

    root /var/www/skyverses-blog/dist;
    index index.html;

    # ─── Bot prerender: redirect social bots to backend meta endpoint ───
    location ~ ^/(?!api|assets|_|sitemap\.xml|robots\.txt)([a-z0-9-]+)$ {
        set $slug $1;

        if ($is_social_bot) {
            # Redirect bot to backend meta prerender endpoint
            # Backend serves pre-filled HTML with correct og:image, title, etc.
            return 302 https://api.skyverses.com/blog/meta/$slug;
        }

        # Regular users: serve SPA
        try_files $uri /index.html;
    }

    # ─── All other routes: SPA fallback ────────────────────────────────
    location / {
        try_files $uri /index.html;
    }

    # ─── Static assets ──────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
