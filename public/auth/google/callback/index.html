<!DOCTYPE html>
<html>
<head>
  <title>Signing in...</title>
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0a0a0c;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
    }
    .loader {
      text-align: center;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #0090ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { font-size: 14px; color: rgba(255,255,255,0.5); }
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <p>Đang xác thực...</p>
  </div>
  <script>
    // Parse the id_token from URL hash fragment
    (function() {
      try {
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const idToken = params.get('id_token');
        const state = params.get('state');
        const error = params.get('error');

        if (error) {
          document.querySelector('p').textContent = 'Đăng nhập thất bại: ' + error;
          setTimeout(() => window.close(), 2000);
          return;
        }

        if (idToken && window.opener) {
          // Send token back to parent window
          window.opener.postMessage({
            type: 'GOOGLE_OAUTH_CALLBACK',
            credential: idToken,
            state: state
          }, window.location.origin);
          
          document.querySelector('p').textContent = 'Đã đăng nhập thành công!';
          setTimeout(() => window.close(), 500);
        } else if (idToken && !window.opener) {
          // Redirect flow (popup was blocked) - store token and redirect
          sessionStorage.setItem('pending_google_token', idToken);
          window.location.href = '/login?oauth_return=1';
        } else {
          document.querySelector('p').textContent = 'Không tìm thấy token. Đang đóng...';
          setTimeout(() => window.close(), 2000);
        }
      } catch (e) {
        document.querySelector('p').textContent = 'Lỗi xác thực. Vui lòng thử lại.';
        console.error('[OAuth Callback]', e);
        setTimeout(() => window.close(), 3000);
      }
    })();
  </script>
</body>
</html>
